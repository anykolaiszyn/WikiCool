name: Build and publish Docker image

# Triggers:
#   - Every push to main         → builds, tags as `latest` and `sha-<short>`
#   - Manual workflow_dispatch   → useful for rebuilding after secret rotation
#
# After a successful build, optionally pings the Portainer webhook to trigger
# an immediate redeploy. Set PORTAINER_WEBHOOK_URL in repo secrets to enable.

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GitHub lowercases image names; this matches ghcr.io/anykolaiszyn/wikicool
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build image and push to ghcr.io
    runs-on: ubuntu-latest

    permissions:
      contents: read   # checkout
      packages: write  # push to ghcr.io

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Auth to ghcr.io ──────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Extract image tags and labels ────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # sha-<7-char-hash> for every build (pinnable)
            type=sha,prefix=sha-
            # `latest` only on the default branch
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 4. QEMU for cross-compilation ───────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 5. Buildx for multi-platform builds ─────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Guard: block build if VITE_GITHUB_TOKEN is set ──────────────────
      # VITE_GITHUB_TOKEN is baked into the static JS bundle at build time.
      # If the image is pushed to a public registry (ghcr.io), anyone who
      # pulls the image can extract the token from the bundle.
      # Leave VITE_GITHUB_TOKEN unset in CI — users authenticate at runtime
      # via the login prompt or the OAuth Worker instead.
      # To allow a baked-in token (private registry only), remove this step.
      - name: Block build if VITE_GITHUB_TOKEN is set (token would be baked into public image)
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
        run: |
          if [ -n "$VITE_GITHUB_TOKEN" ]; then
            echo "::error::VITE_GITHUB_TOKEN is set as a CI secret."
            echo "This token will be statically embedded in the Docker image and"
            echo "is extractable by anyone who pulls the image from ghcr.io."
            echo "Remove the VITE_GITHUB_TOKEN secret and use the runtime login"
            echo "prompt or OAuth Worker for authentication instead."
            exit 1
          fi

      # ── 7. Build and push ───────────────────────────────────────────────────
      #
      # VITE_* variables are baked into the image at build time by Vite.
      # They are sourced from GitHub Actions secrets / variables:
      #
      #   Secrets (Settings → Secrets and variables → Actions → Secrets):
      #     VITE_GITHUB_OWNER   — GitHub username/org that owns the content repo
      #     VITE_GITHUB_REPO    — content repo name (e.g. vcc-wiki-content)
      #     VITE_GITHUB_TOKEN   — DO NOT set in CI (token embeds in public image;
      #                           use runtime login prompt or OAuth Worker instead)
      #     PORTAINER_WEBHOOK_URL — Portainer stack webhook URL (optional;
      #                           leave unset to skip auto-redeploy)
      #
      #   Variables (Settings → Secrets and variables → Actions → Variables):
      #     VITE_GITHUB_BRANCH  — default branch of the content repo (default: main)
      #     VITE_CONTENT_PATH   — content root inside the repo   (default: content)
      #     VITE_OAUTH_BASE     — Cloudflare Worker URL for OAuth (optional)
      #     VITE_WEBHOOK_BASE   — Cloudflare Worker URL for SSE   (optional)
      #
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_GITHUB_OWNER=${{ secrets.VITE_GITHUB_OWNER }}
            VITE_GITHUB_REPO=${{ secrets.VITE_GITHUB_REPO }}
            VITE_GITHUB_BRANCH=${{ vars.VITE_GITHUB_BRANCH || 'main' }}
            VITE_CONTENT_PATH=${{ vars.VITE_CONTENT_PATH || 'content' }}
            VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}
            VITE_OAUTH_BASE=${{ vars.VITE_OAUTH_BASE }}
            VITE_WEBHOOK_BASE=${{ vars.VITE_WEBHOOK_BASE }}
          # Layer cache via GitHub Actions cache backend — dramatically speeds up
          # incremental builds (node_modules layer is almost always a cache hit).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 8. Trigger Portainer redeploy ────────────────────────────────────────
      # Portainer exposes a per-stack webhook URL that pulls the latest image
      # and recreates the container. Set PORTAINER_WEBHOOK_URL as a repo secret
      # to enable automatic redeploy after every successful image push.
      - name: Trigger Portainer redeploy
        if: success()
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL not set — skipping redeploy"
            exit 0
          fi
          echo "Pinging Portainer webhook…"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$PORTAINER_WEBHOOK_URL")
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Portainer redeploy triggered (HTTP $HTTP_STATUS)"
          else
            echo "Warning: Portainer webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi
